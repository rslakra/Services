name: Commerce - IWS CI

on:
  push:
    paths:
      - "Commerce/e-commerce/ecommerce-iws/**"
      - ".github/workflows/ecommerce-iws-ci.yml"
  pull_request:
    paths:
      - "Commerce/e-commerce/ecommerce-iws/**"
      - ".github/workflows/ecommerce-iws-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: Commerce/e-commerce/ecommerce-iws

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Commerce/e-commerce/ecommerce-iws/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
