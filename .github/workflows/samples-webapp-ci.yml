name: Samples WebApp - WebApp CI

on:
  push:
    paths:
      - "Samples/Python/WebApp/**"
      - ".github/workflows/samples-webapp-ci.yml"
  pull_request:
    paths:
      - "Samples/Python/WebApp/**"
      - ".github/workflows/samples-webapp-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: Samples/Python/WebApp

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Samples/Python/WebApp/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -t . -v
